<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ripple Xerox</title>
<style>
  :root {
    --bg: #0d0e12;
    --panel: #16181f;
    --panel-2: #1d2029;
    --line: #2a2e3a;
    --text: #e6e8ee;
    --muted: #8b90a0;
    --accent: #6ea8fe;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%;
    background: var(--bg);
    color: var(--text);
    font: 13px/1.4 -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    overflow: hidden;
  }
  #app { display: flex; height: 100%; }

  /* ---- Stage ---- */
  #stage {
    flex: 1; position: relative;
    display: flex; align-items: center; justify-content: center;
    background:
      linear-gradient(45deg, #15161c 25%, transparent 25%) -10px 0,
      linear-gradient(-45deg, #15161c 25%, transparent 25%) -10px 0,
      linear-gradient(45deg, transparent 75%, #15161c 75%),
      linear-gradient(-45deg, transparent 75%, #15161c 75%);
    background-size: 20px 20px;
    background-color: #101116;
    overflow: hidden;
  }
  #glcanvas {
    max-width: 100%; max-height: 100%;
    cursor: crosshair;
    box-shadow: 0 10px 50px rgba(0,0,0,.5);
    image-rendering: auto;
  }
  #drop-hint {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 10px;
    color: var(--muted); pointer-events: none; text-align: center;
    transition: opacity .2s;
  }
  #drop-hint .big { font-size: 18px; color: var(--text); }
  #drop-hint.hidden { opacity: 0; }
  #stage.dragover::after {
    content: ""; position: absolute; inset: 14px;
    border: 2px dashed var(--accent); border-radius: 12px;
    pointer-events: none;
  }
  #origin-dot {
    position: absolute; width: 14px; height: 14px; margin: -7px 0 0 -7px;
    border: 2px solid #fff; border-radius: 50%;
    box-shadow: 0 0 0 2px rgba(0,0,0,.6), 0 0 12px rgba(110,168,254,.9);
    pointer-events: none; mix-blend-mode: difference; display: none;
  }

  /* ---- Panel ---- */
  #panel {
    width: 300px; flex: none; background: var(--panel);
    border-left: 1px solid var(--line);
    display: flex; flex-direction: column;
  }
  #panel header {
    padding: 16px 16px 12px; border-bottom: 1px solid var(--line);
  }
  #panel header h1 { margin: 0; font-size: 15px; letter-spacing: .3px; }
  #panel header p { margin: 4px 0 0; color: var(--muted); font-size: 11px; }
  .scroll { overflow-y: auto; padding: 6px 16px 16px; flex: 1; }
  .scroll::-webkit-scrollbar { width: 10px; }
  .scroll::-webkit-scrollbar-thumb { background: var(--panel-2); border-radius: 8px; border: 3px solid var(--panel); }

  .group { margin-top: 14px; }
  .group > .label {
    font-size: 10px; letter-spacing: .8px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 6px;
  }
  .ctrl { margin: 11px 0; }
  .ctrl .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; gap: 8px; }
  .ctrl .name { color: var(--text); }
  /* editable number field that looks like the blue value text */
  .ctrl .num {
    width: 76px; text-align: right; color: var(--accent);
    font: 600 12px/1.2 ui-monospace, Menlo, monospace; font-variant-numeric: tabular-nums;
    background: transparent; border: 1px solid transparent; border-radius: 6px;
    padding: 3px 6px; outline: none; cursor: text;
    -moz-appearance: textfield;
  }
  .ctrl .num::-webkit-outer-spin-button,
  .ctrl .num::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .ctrl .num:hover { border-color: var(--line); }
  .ctrl .num:focus { border-color: var(--accent); background: var(--panel-2); cursor: text; }

  input[type=range] {
    -webkit-appearance: none; appearance: none; width: 100%; height: 16px;
    background: transparent; outline: none; margin: 0; cursor: pointer; display: block;
  }
  /* WebKit/Safari: MUST style the track or the control collapses & disappears */
  input[type=range]::-webkit-slider-runnable-track {
    height: 4px; border-radius: 4px; background: var(--panel-2);
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none; width: 14px; height: 14px; border-radius: 50%;
    background: var(--accent); cursor: pointer; border: 2px solid #0d0e12; margin-top: -5px;
  }
  /* Firefox */
  input[type=range]::-moz-range-track { height: 4px; border-radius: 4px; background: var(--panel-2); }
  input[type=range]::-moz-range-thumb {
    width: 12px; height: 12px; border-radius: 50%; background: var(--accent);
    border: 2px solid #0d0e12; cursor: pointer;
  }
  .btns { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
  button {
    flex: 1; min-width: 0; padding: 9px 10px; border-radius: 8px;
    border: 1px solid var(--line); background: var(--panel-2); color: var(--text);
    cursor: pointer; font-size: 12px;
  }
  button:hover { border-color: var(--accent); }
  button.primary { background: var(--accent); color: #0d0e12; border-color: var(--accent); font-weight: 600; }
  .toggle-row { display: flex; align-items: center; gap: 8px; margin: 10px 0; }
  .toggle-row input { accent-color: var(--accent); }
  .hint { color: var(--muted); font-size: 11px; margin-top: 8px; }
  select {
    width: 100%; padding: 7px 8px; border-radius: 8px; background: var(--panel-2);
    color: var(--text); border: 1px solid var(--line);
  }
</style>
</head>
<body>
<div id="app">
  <div id="stage">
    <canvas id="glcanvas"></canvas>
    <div id="origin-dot"></div>
    <div id="drop-hint">
      <div class="big">Drop an image here</div>
      <div>or click “Load image” &middot; then click the canvas to set the ripple origin</div>
    </div>
  </div>

  <div id="panel">
    <header>
      <h1>Ripple Xerox</h1>
      <p>Click the canvas to set where the ripples start.</p>
    </header>
    <div class="scroll">
      <div class="btns">
        <button id="loadBtn" class="primary">Load image</button>
        <button id="centerBtn">Re-center</button>
      </div>
      <input id="fileInput" type="file" accept="image/*" hidden />

      <div class="group">
        <div class="label">Repetition</div>
        <!-- controls injected by JS -->
        <div id="g-rep"></div>
      </div>

      <div class="group">
        <div class="label">Ripples</div>
        <div id="g-rip"></div>
      </div>

      <div class="group">
        <div class="label">Organic variation</div>
        <div id="g-org"></div>
      </div>

      <div class="group">
        <div class="label">Motion</div>
        <div class="toggle-row">
          <input type="checkbox" id="animate" />
          <label for="animate">Animate (ripples flow)</label>
        </div>
        <div id="g-mot"></div>
      </div>

      <div class="group">
        <div class="label">Look</div>
        <div class="ctrl">
          <div class="row"><span class="name">Edge wrap</span></div>
          <select id="wrapMode">
            <option value="mirror">Mirror (seamless ripples)</option>
            <option value="clamp">Clamp (smear edges)</option>
            <option value="repeat">Tile (repeat)</option>
          </select>
        </div>
        <div id="g-look"></div>
      </div>

      <div class="group">
        <div class="label">Output</div>
        <div class="btns">
          <button id="resetBtn">Reset</button>
          <button id="saveBtn">Save PNG</button>
        </div>
        <div class="hint" id="status">No image loaded.</div>
      </div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
